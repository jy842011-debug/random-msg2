<!DOCTYPE html>

<html lang="ko">

<head>

<meta charset="UTF-8">

<title>랜덤 문구</title>

<style>

body {

  background-image: url("https://github.com/jy842011-debug/random-msg2/blob/main/3643882.jpg");
  background-size: cover;
  background-position
  
  background: linear-gradient(45deg, #ff9a9e, #fecfef, #fecfef, #ff9a9e, #a8edea, #fed6e3, #1a1a2e, #ff68b4);

  background-size: 400% 400%;

  animation: gradient 15s ease infinite;

  font-family: 'Arial Black', sans-serif;

  text-align: center;

  padding: 100px 20px;

  margin: 0;

  height: 100vh;

}

h1 {

  font-size: 3em;

  color: #fff;

  text-shadow: 3px 3px 6px rgba(0,0,0,0.5);

  animation: fadeIn 1.5s ease-out, glow 2s ease-in-out infinite alternate;

  margin: 0;

}

@keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

@keyframes fadeIn { from { opacity: 0; transform: scale(0.8) translateY(30px); } to { opacity: 1; transform: scale(1) translateY(0); } }

@keyframes glow { from { text-shadow: 3px 3px 6px rgba(0,0,0,0.5); } to { text-shadow: 0 0 20px #fff, 3px 3px 6px rgba(0,0,0,0.5); } }

</style>

</head>

<body>

<h1 id="msg">터치하세요!</h1>

<script>

const msgs = ["오늘도 화이팅 💕", "웃으며 하루 보내요 😊", "너는 최고야! ✨", "좋은 일 가득! 🌟", "너 정말 잘해 💖", "오늘도 빛나 ✨", "괜찮아 다 지나가 😌", "너의 가능성 무한해 🌈", "천천히 가도 돼 🐢", "이미 충분해 🌟", "작은 승리 축하! 🎉", "내일도 화이팅 💪", "너만의 매력 최고 💎"];

const msgEl = document.getElementById("msg");

msgEl.innerText = msgs[Math.floor(Math.random() * msgs.length)];

</script>

</body>

</html>
